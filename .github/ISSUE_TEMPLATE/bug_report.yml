name: Bug report
description: File a bug report to help us improve
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Brief one-line summary of the bug
      placeholder: "e.g., Agent start button crashes on Safari"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error '....'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include logs or screenshots if possible.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this happen?
      options:
        - Local development
        - Docker Compose
        - Production (self-hosted)
        - Cloud / unknown
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Python, Node, Docker, OS versions
      placeholder: "Python 3.11.8, Node 20.12, Docker 24.0, Ubuntu 22.04"
    validations:
      required: false
