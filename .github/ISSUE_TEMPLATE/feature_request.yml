name: Feature request
description: Suggest an idea for this project
title: "[Feat] "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please provide context to help us understand the need.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What use case does it address?
      placeholder: "I'm frustrated when I have to manually restart agents every time..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see. Include UI/UX ideas if applicable.
      placeholder: "Add a 'Restart All' button on the Agents page that restarts all stopped agents..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you thought of any alternative approaches or workarounds?
      placeholder: "Currently I use a cron job to restart agents, but it's not ideal..."
    validations:
      required: false
  - type: checkboxes
    id: effort
    attributes:
      label: Stakeholders
      description: Who would benefit from this feature?
      options:
        - label: End users (people using the dashboard)
        - label: Maintainers (ops overhead)
        - label: Integrators (embedding xander-nexus into other systems)
    validations:
      required: false
