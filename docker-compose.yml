version: '3.8'

services:
  xander-operator:
    build: .
    ports:
      - "8001:8001"
    environment:
      - XANDER_OPERATOR_ENV=production
      - XANDER_OPERATOR_PORT=8001
      - OLLAMA_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./workspace:/app/workspace
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: local LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    profiles: ["llm"]

volumes:
  ollama:
